<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Store - Express checkout</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }
    .checkout-container {
      max-width: 500px;
      width: 100%;
      background-color: #1e293b;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }
    h1 {
      font-size: 1.5rem;
      margin-top: 0;
      color: #38bdf8;
      border-bottom: 2px dashed #334155;
      padding-bottom: 15px;
    }
    .item-summary {
      background-color: #0f172a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-name {
      font-weight: 600;
    }
    .item-price {
      color: #4ade80;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #475569;
      background-color: #0f172a;
      color: #f8fafc;
      font-size: 0.95rem;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #38bdf8;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background-color: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #0ea5e9;
    }
    .status-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
      line-height: 1.4;
    }
    .status-success {
      background-color: rgba(74, 222, 128, 0.1);
      border: 1px solid #4ade80;
      color: #4ade80;
    }
    .status-error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid #f87171;
      color: #f87171;
    }
  </style>
</head>
<body>

<div class="checkout-container">
  <h1>Developer Store Checkout</h1>
  
  <div class="item-summary">
    <div>
      <div class="item-name">Developer Mechanical Keyboard</div>
      <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Item ID: item_901</div>
    </div>
    <div class="item-price">$99.99</div>
  </div>

  <form id="checkout-form" onsubmit="handleCheckout(event)">
    <div class="form-group">
      <label for="email-input">Billing Email Address</label>
      <input type="text" id="email-input" placeholder="e.g. name@company.com" required>
    </div>
    
    <button type="submit" id="checkout-btn" class="btn">Pay & Complete Order</button>
  </form>

  <div id="status-box" class="status-box"></div>
</div>

<script>
  async function handleCheckout(e) {
    e.preventDefault();
    const email = document.getElementById('email-input').value;
    const statusBox = document.getElementById('status-box');
    
    statusBox.style.display = 'none';
    statusBox.className = 'status-box';

    try {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          cartId: 'cart_901',
          paymentMethod: 'stripe'
        })
      });
      const data = await res.json();
      
      statusBox.style.display = 'block';
      if (res.ok) {
        statusBox.classList.add('status-success');
        statusBox.innerHTML = `<strong>Order Placed Successfully!</strong><br>Order ID: ${data.orderId}<br>Amount Charged: $99.99`;
      } else {
        statusBox.classList.add('status-error');
        statusBox.innerText = data.error || 'Checkout validation failed.';
      }
    } catch (err) {
      statusBox.style.display = 'block';
      statusBox.classList.add('status-error');
      statusBox.innerText = 'Network error occurred during checkout.';
    }
  }
</script>

</body>
</html>
